name: Publish to npm
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (all, adk, adk-cli, adk-server, aza-client, workspace-types)'
        required: true
        default: 'all'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AIZONA_TOKEN }}
        
      - name: Build publishable packages
        run: |
          pnpm --filter @aizonaai/adk run build
          pnpm --filter @aizonaai/adk-server run build
        # Excluded from v0.1.0: adk-cli (DTS needs adk-server types), aza-protocol, aza-client, workspace-types

      # Publish in dependency order: leaf packages first, then dependents
      - name: Publish @aizonaai/adk (leaf - no @aizona deps)
        if: inputs.package == 'all' || inputs.package == 'adk' || startsWith(github.ref, 'refs/tags/')
        run: cd packages/adk && npm publish --access public --provenance || echo "Already published or error"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AIZONA_TOKEN }}

      # Note: @aizonaai/aza-client and @aizonaai/contracts-workspace-architect excluded until build issues resolved

      - name: Publish @aizonaai/adk-server (depends on @aizonaai/adk)
        if: inputs.package == 'all' || inputs.package == 'adk-server' || startsWith(github.ref, 'refs/tags/')
        run: cd packages/adk-server && npm publish --access public --provenance || echo "Already published or error"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AIZONA_TOKEN }}
          
      # Note: @aizonaai/adk-cli excluded from v0.1.0 (DTS build needs adk-server types installed)
