name: Publish to npm
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (all, adk, adk-cli, adk-server, aza-client, workspace-types)'
        required: true
        default: 'all'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AIZONA_TOKEN }}
        
      - name: Build packages
        run: pnpm run build

      # Publish in dependency order: leaf packages first, then dependents
      - name: Publish @aizona/adk (leaf - no @aizona deps)
        if: inputs.package == 'all' || inputs.package == 'adk' || startsWith(github.ref, 'refs/tags/')
        run: cd packages/adk && npm publish --access public --provenance || echo "Already published or error"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AIZONA_TOKEN }}

      - name: Publish @aizona/aza-client (leaf - depends on aza-protocol which is not published)
        if: inputs.package == 'all' || inputs.package == 'aza-client' || startsWith(github.ref, 'refs/tags/')
        run: cd packages/aza-client && npm publish --access public --provenance || echo "Already published or error"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AIZONA_TOKEN }}

      - name: Publish @aizona/contracts-workspace-architect (leaf)
        if: inputs.package == 'all' || inputs.package == 'workspace-types' || startsWith(github.ref, 'refs/tags/')
        run: cd packages/workspace-types && npm publish --access public --provenance || echo "Already published or error"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AIZONA_TOKEN }}
          
      - name: Publish @aizona/adk-server (depends on @aizona/adk)
        if: inputs.package == 'all' || inputs.package == 'adk-server' || startsWith(github.ref, 'refs/tags/')
        run: cd packages/adk-server && npm publish --access public --provenance || echo "Already published or error"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AIZONA_TOKEN }}
          
      - name: Publish @aizona/adk-cli (depends on @aizona/adk + @aizona/adk-server)
        if: inputs.package == 'all' || inputs.package == 'adk-cli' || startsWith(github.ref, 'refs/tags/')
        run: cd packages/adk-cli && npm publish --access public --provenance || echo "Already published or error"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AIZONA_TOKEN }}
